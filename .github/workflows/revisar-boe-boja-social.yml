name: Revisar BOE y BOJA - ayudas sociales

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Fecha a revisar en formato YYYY-MM-DD. Si se deja vacia, usa hoy en Europe/Madrid."
        required: false
        type: string

permissions:
  contents: write

jobs:
  revisar:
    runs-on: ubuntu-latest
    env:
      RUN_DATE: ${{ github.event.inputs.date || '' }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Revisar BOE y BOJA
        run: |
          if [ -n "$RUN_DATE" ]; then
            python scraper_boe_boja_social.py --date "$RUN_DATE"
          else
            python scraper_boe_boja_social.py
          fi

      - name: Guardar resultados en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add informes_boe_boja_social/
          if git diff --cached --quiet; then
            echo "No hay cambios que guardar."
          else
            git commit -m "Actualizar ayudas sociales BOE/BOJA"
            git push
          fi
